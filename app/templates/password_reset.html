<!doctype html><html><head><meta charset="utf-8"><title>Reset Password - CreditSapientia CRM</title><style>body{margin:0;font-family:Inter,Arial,sans-serif;color:#f3e5bc;background:#071220 url('/static/brand/themes/{{ current_theme|default("cosmic_03_royal_blue_elegance", true) }}.png') center/cover no-repeat fixed;min-height:100vh;display:grid;place-items:center}.card{width:min(620px,92vw);padding:28px;border-radius:24px;background:rgba(8,18,33,.9);border:1px solid rgba(215,175,87,.35);box-shadow:0 18px 42px rgba(0,0,0,.34)}h1{margin:0 0 8px;font-size:36px;color:#f1d38b}p{color:#cab889}label{display:block;font-weight:800;margin:14px 0 6px}input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid rgba(215,175,87,.28);background:#fff;color:#111827}button,a.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 16px;border-radius:12px;font-weight:800;border:1px solid rgba(215,175,87,.35);background:linear-gradient(180deg,#f3d88f,#c79131);color:#231605;text-decoration:none}.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.flash{padding:12px 14px;border-radius:14px;margin-bottom:12px}.flash.error{background:rgba(239,68,68,.14);border:1px solid rgba(254,202,202,.35);color:#ffd8d8}.flash.success{background:rgba(34,197,94,.14);border:1px solid rgba(134,239,172,.35);color:#d7ffdb}</style></head><body><div class="card">{% if error %}<div class="flash error">{{ error }}</div>{% endif %}{% if message %}<div class="flash success">{{ message }}</div>{% endif %}<h1>Reset Password</h1><p>Create a new password. It must have at least 8 characters, with 1 uppercase letter, 1 lowercase letter, 1 number, and 1 symbol.</p><form method="post" action="/ui/password/reset"><input type="hidden" name="token" value="{{ token }}"><label>New Password</label><input type="password" name="new_password" required><label>Confirm Password</label><input type="password" name="new_password_confirm" required><div class="row"><button type="submit">Save New Password</button><a class="btn" href="/">Back to Login</a></div></form></div></body></html>
