
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Edit Client {{ client_id }}</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .box { border: 1px solid #ddd; padding: 16px; border-radius: 8px; margin-bottom: 16px; }
    input, select { padding: 8px; width: 100%; box-sizing: border-box; }
    button, .btn { padding: 8px 12px; cursor: pointer; text-decoration: none; display: inline-block; border: 1px solid #ccc; border-radius: 6px; background: white; color: black; }
    .row { margin-bottom: 10px; }
    .actions { display:flex; gap:8px; margin-bottom:16px; }
    h3 { margin-top: 0; }
  </style>
</head>
<body>
  <div class="actions">
    <a class="btn" href="/ui/client/{{ client_id }}">← Back to Client</a>
  </div>

  <h1>Edit Client Profile</h1>

  <form method="post" action="/ui/client/save-profile">
    <input type="hidden" name="client_id" value="{{ client_id }}">

    <div class="grid">
      <div class="box">
        <h3>Identity</h3>
        <div class="row"><label>First name</label><input name="first_name" value="{{ profile.get('first_name') or '' }}" required></div>
        <div class="row"><label>Middle name</label><input name="middle_name" value="{{ profile.get('middle_name') or '' }}"></div>
        <div class="row"><label>Last name</label><input name="last_name" value="{{ profile.get('last_name') or '' }}" required></div>
        <div class="row">
          <label>Suffix</label>
          <select name="suffix">
            {% for s in suffixes %}
              <option value="{{ s }}" {% if profile.get('suffix') == s %}selected{% endif %}>{{ s or '—' }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="row"><label>Date of birth</label><input type="date" name="date_of_birth" value="{{ profile.get('date_of_birth') or '' }}"></div>
        <div class="row"><label>Social Security (full)</label><input name="ssn_full" value="{{ profile.get('ssn_full') or '' }}"></div>
      </div>

      <div class="box">
        <h3>Contact</h3>
        <div class="row"><label>Primary phone</label><input name="primary_phone" value="{{ profile.get('phone') or '' }}"></div>
        <div class="row">
          <label>Primary phone type</label>
          <select name="primary_phone_type">
            {% for p in phone_types %}
              <option value="{{ p }}" {% if profile.get('primary_phone_type') == p %}selected{% endif %}>{{ p }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="row"><label>Secondary phone</label><input name="secondary_phone" value="{{ profile.get('secondary_phone') or '' }}"></div>
        <div class="row">
          <label>Secondary phone type</label>
          <select name="secondary_phone_type">
            {% for p in phone_types %}
              <option value="{{ p }}" {% if profile.get('secondary_phone_type') == p %}selected{% endif %}>{{ p }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="row"><label>Primary email</label><input name="primary_email" value="{{ profile.get('primary_email') or '' }}"></div>
        <div class="row"><label>Secondary email</label><input name="secondary_email" value="{{ profile.get('secondary_email') or '' }}"></div>
        <div class="row">
          <label>Preferred email</label>
          <select name="preferred_email_choice">
            <option value="primary" {% if profile.get('preferred_email_choice') == 'primary' %}selected{% endif %}>primary</option>
            <option value="secondary" {% if profile.get('preferred_email_choice') == 'secondary' %}selected{% endif %}>secondary</option>
          </select>
        </div>
        <div class="row">
          <label><input type="checkbox" name="send_to_both_emails" {% if profile.get('send_to_both_emails') %}checked{% endif %}> Send to both emails</label>
        </div>
      </div>
    </div>

    <div class="grid">
      <div class="box">
        <h3>Address</h3>
        <div class="row"><label>Address line 1</label><input name="address_line1" value="{{ profile.get('address_line1') or '' }}"></div>
        <div class="row"><label>Apt / Unit</label><input name="apt_unit" value="{{ profile.get('apt_unit') or '' }}"></div>
        <div class="row"><label>Address line 2</label><input name="address_line2" value="{{ profile.get('address_line2') or '' }}"></div>
        <div class="row"><label>City</label><input name="city" value="{{ profile.get('city') or '' }}"></div>
        <div class="row"><label>State</label><input name="state" value="{{ profile.get('state') or '' }}"></div>
        <div class="row"><label>ZIP</label><input name="zip_code" value="{{ profile.get('zip') or '' }}"></div>
      </div>

      <div class="box">
        <h3>Status / Referral</h3>
        <div class="row"><label><input type="checkbox" name="is_active" {% if profile.get('is_active') %}checked{% endif %}> Active</label></div>
        <div class="row"><label><input type="checkbox" name="pending_payment" {% if profile.get('pending_payment') %}checked{% endif %}> Pending payment warning</label></div>
        <div class="row">
          <label>Lifecycle status</label>
          <select name="lifecycle_status">
            {% for s in statuses %}
              <option value="{{ s }}" {% if profile.get('lifecycle_status') == s %}selected{% endif %}>{{ s }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="row"><label>Start date</label><input type="date" name="start_date" value="{{ profile.get('start_date') or '' }}"></div>
        <div class="row"><label>Cancelled date</label><input type="date" name="cancelled_date" value="{{ profile.get('cancelled_date') or '' }}"></div>

        <div class="row">
          <label>Referred by</label>
          <select name="referred_by_partner_id">
            <option value="">—</option>
            {% for rp in referral_partners %}
              <option value="{{ rp.id }}" {% if profile.get('referred_by_partner_id') == rp.id %}selected{% endif %}>
                {{ rp.name }}{% if rp.company_name %} — {{ rp.company_name }}{% endif %}
              </option>
            {% endfor %}
          </select>
        </div>
        <div class="row"><label>Referral / referred-out reason</label><input name="referral_reason" value="{{ profile.get('referral_reason') or '' }}"></div>
      </div>
    </div>

    <div class="grid">
      <div class="box">
        <h3>Fees / Pricing</h3>
        <div class="row"><label>Consultation fee</label><input type="number" step="0.01" name="consultation_fee" value="{{ profile.get('consultation_fee') or '100.00' }}"></div>
        <div class="row">
          <label>Pricing plan</label>
          <select name="pricing_plan">
            {% for p in pricing_plans %}
              <option value="{{ p }}" {% if profile.get('pricing_plan') == p %}selected{% endif %}>{{ p }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="row"><label>Startup fee</label><input type="number" step="0.01" name="initial_fee" value="{{ profile.get('initial_fee') or '175.00' }}"></div>
        <div class="row"><label>Monthly fee</label><input type="number" step="0.01" name="monthly_fee" value="{{ profile.get('monthly_fee') or '125.00' }}"></div>
      </div>

      <div class="box">
        <h3>Billing</h3>
        <div class="row"><label>Signup date</label><input type="date" name="signup_date" value="{{ profile.get('signup_date') or '' }}"></div>
        <div class="row"><label>First payment date</label><input type="date" name="first_payment_date" value="{{ profile.get('first_payment_date') or '' }}"></div>
        <div class="row">
          <label>Billing group</label>
          <select name="billing_group">
            {% for g in billing_groups %}
              <option value="{{ g }}" {% if profile.get('billing_group') == g %}selected{% endif %}>{{ g }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="row"><label>Custom billing day</label><input type="number" min="1" max="31" name="custom_billing_day" value="{{ profile.get('custom_billing_day') or '' }}"></div>
        <div class="row">
          <label>Preferred payment method</label>
          <select name="preferred_payment_method">
            {% for m in payment_methods %}
              <option value="{{ m }}" {% if profile.get('preferred_payment_method') == m %}selected{% endif %}>{{ m }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
    </div>

    <button type="submit">Save Profile</button>
  </form>
</body>
</html>
